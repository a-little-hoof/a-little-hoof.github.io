---
layout: raw
---
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  {% if page.excerpt %}<meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | escape_once }}">{% endif %}
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  {% include head/custom.html %}
  <style>
  :root {
    --fg: #252932;
    --fg-muted: #66707a;
    --fg-soft: #87909a;
    --accent: #24788d;
    --accent-soft: #e9f4f6;
    --rule: #dfe4e8;
    --rule-soft: #edf0f2;
    --code-bg: #f5f7f8;
    --surface: #ffffff;
  }
  html {
    font-family: "Inter", "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--fg);
    background: var(--surface);
  }
  body {
    margin: 0;
    padding: 0;
    background: var(--surface);
  }
  .article-shell {
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.25rem 3rem;
  }
  .post-wrap {
    max-width: 760px;
    margin: 0 auto;
    font-size: 16.8px;
    line-height: 1.76;
    color: var(--fg);
  }
  .post-wrap p,
  .post-wrap li {
    color: var(--fg);
    line-height: 1.76;
    font-size: 16.8px;
  }
  .post-wrap a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: rgba(36, 120, 141, 0.26);
    text-decoration-thickness: 1px;
    text-underline-offset: 0.18em;
  }
  .post-wrap a:hover { text-decoration-color: currentColor; }
  .post-wrap strong,
  .post-wrap b { font-weight: 600; color: var(--fg); }
  .post-wrap h2 {
    font-family: inherit;
    font-size: 2.5rem;
    font-weight: 600;
    margin: 2.45rem 0 0.8rem;
    padding: 0.95rem 0 0;
    border-top: 1px solid var(--rule);
    border-bottom: none;
    color: var(--fg);
    letter-spacing: 0;
    scroll-margin-top: 1.25rem;
  }
  .post-wrap h3 {
    font-family: inherit;
    font-size: 1.42rem;
    font-weight: 650;
    margin: 1.75rem 0 0.65rem;
    color: var(--fg);
    letter-spacing: 0;
  }
  .post-wrap blockquote {
    margin: 0 0 1.25rem;
    padding: 0.75rem 1rem;
    border-left: 4px solid var(--accent);
    background: var(--accent-soft);
    color: var(--fg);
  }
  .post-wrap blockquote p {
    margin: 0;
    color: var(--fg);
  }
  .post-header {
    position: relative;
    margin-bottom: 1.25rem;
    padding: 0.85rem 0 1rem;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule-soft);
  }
  .post-header::before {
    content: "";
    position: absolute;
    top: -1px;
    left: 0;
    width: 92px;
    height: 4px;
    background: var(--accent);
  }
  .post-header h1 {
    font-family: inherit;
    margin: 0 0 0.75rem;
    font-size: 3rem;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: 0;
    color: var(--fg);
  }
  .post-header .title-main {
    display: block;
    max-width: 720px;
  }
  .post-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
  }
  .post-tags .tag {
    display: inline-flex;
    align-items: center;
    min-height: 1.45rem;
    padding: 0.08rem 0.55rem;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 0.78rem;
    font-weight: 600;
  }
  .post-wrap img {
    height: auto;
    max-width: 100%;
  }
  .post-wrap code {
    padding: 0.12rem 0.28rem;
    border-radius: 4px;
    background: var(--code-bg);
    color: var(--fg);
    font-size: 0.92em;
  }
  .post-wrap pre {
    overflow-x: auto;
    padding: 1rem;
    border-radius: 8px;
    background: var(--code-bg);
  }
  .post-wrap pre code {
    padding: 0;
    background: transparent;
  }
  .post-wrap table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    font-size: 0.94rem;
  }
  .post-wrap table th,
  .post-wrap table td {
    padding: 0.55rem 0.7rem;
    border-bottom: 1px solid var(--rule-soft);
    vertical-align: top;
  }
  .post-wrap table th {
    color: var(--fg);
    font-weight: 650;
    border-bottom-color: var(--rule);
  }
  .post-wrap .footnote-ref {
    font-size: 0.72em;
    vertical-align: super;
  }
  .post-wrap .references-section {
    margin-top: 3rem;
    color: var(--fg-muted);
  }
  @media (max-width: 640px) {
    .article-shell {
      padding: 1.2rem 1rem 2.5rem;
    }
    .post-header h1 {
      font-size: 2.28rem;
      line-height: 1.08;
    }
    .post-wrap,
    .post-wrap p,
    .post-wrap li {
      font-size: 16.2px;
    }
    .post-wrap h2 {
      font-size: 2rem;
      margin-top: 2rem;
    }
  }
  </style>
</head>
<body>
  <main class="article-shell">
    <article class="post-wrap page__content">
      <header class="post-header">
        <h1><span class="title-main">{{ page.title }}</span></h1>
        {% if page.tags %}
        <div class="post-tags">
          {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
      </header>

      {{ content }}
    </article>
  </main>
  {% include scripts.html %}
</body>
</html>
